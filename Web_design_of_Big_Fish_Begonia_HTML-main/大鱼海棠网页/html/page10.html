    <main>
        <h2>观影感触</h2>

        <!-- 显示已有留言 -->
        <div id="commentList" style="width:80%; margin:0 auto 30px;"></div>

        <div class="success-tip" id="successTip">发表成功</div>
        <form id="commentForm">
            <span>你的姓名：</span><input type="text" id="nameInput" /><br>
            <span>联系方式：</span><input type="text" id="contactInput" pattern="^\d{11}$" /><br>
            <span>你想说的话</span><textarea id="contentInput"></textarea>
            <button type="submit">发表</button>
        </form>
    </main>

    <!-- 引入公共逻辑 -->
    <script src="../js/common.js"></script>

    <!-- 页面特有的留言功能 -->
    <script>
        var successTip = document.getElementById('successTip');
        var commentForm = document.getElementById('commentForm');

        // 渲染已有留言
        function renderComments() {
            var list = document.getElementById('commentList');
            var comments = JSON.parse(localStorage.getItem('comments')) || [];
            if (comments.length === 0) {
                list.innerHTML = '<p style="color:#b7a696;text-align:center;">暂无留言，快来发表你的观影感触吧！</p>';
                return;
            }
            var html = '<h3 style="color:#b2652d;text-align:center;margin-bottom:20px;">📝 已有留言</h3>';
            comments.forEach(function(c) {
                html += '<div style="background:rgba(255,255,255,0.1);padding:12px 18px;border-radius:8px;margin-bottom:12px;border-left:3px solid #b2652d;">';
                html += '<p style="font-weight:bold;color:#e46427;">' + c.name + '</p>';
                html += '<p style="color:#f7e6ca;font-size:13px;margin:4px 0;">' + c.content + '</p>';
                html += '<p style="color:#b7a696;font-size:12px;text-align:right;">' + c.time + '</p>';
                html += '</div>';
            });
            list.innerHTML = html;
        }

        if (commentForm) {
            var comments = JSON.parse(localStorage.getItem('comments')) || [];

            commentForm.addEventListener('submit', function(e) {
                e.preventDefault();

                var name = document.getElementById('nameInput').value.trim();
                var contact = document.getElementById('contactInput').value.trim();
                var content = document.getElementById('contentInput').value.trim();

                if (!name || !contact || !content) {
                    alert('请完整填写所有字段');
                    return;
                }
                if (!/^\d{11}$/.test(contact)) {
                    alert('联系方式需为11位数字');
                    return;
                }

                comments.push({
                    name: name,
                    contact: contact,
                    content: content,
                    time: new Date().toLocaleString()
                });

                localStorage.setItem('comments', JSON.stringify(comments));

                successTip.classList.add('show');
                setTimeout(function() {
                    successTip.classList.remove('show');
                }, 1500);

                commentForm.reset();
                renderComments(); // 刷新留言列表
            });
        }

        // 页面加载时显示已有留言
        renderComments();
    </script>
