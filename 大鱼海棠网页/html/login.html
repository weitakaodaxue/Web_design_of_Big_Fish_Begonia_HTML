<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>登录</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		body {
			overflow: hidden;
			font-family: "微软雅黑", sans-serif;
			background: url("../images/1.jpg") center/cover no-repeat;
			height: 100vh;
		}
		body::before {
			content: "";
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.45);
		}
		.login-wrap {
			position: relative;
			z-index: 1;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100%;
		}
		.login-box {
			width: 420px;
			padding: 36px 32px;
			background: rgba(255, 255, 255, 0.88);
			border-radius: 16px;
			box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
		}
		.login-box h1 {
			text-align: center;
			color: #8a3d1a;
			margin-bottom: 22px;
			font-size: 28px;
		}
		.form-group {
			margin-bottom: 16px;
		}
		.form-group label {
			display: block;
			margin-bottom: 8px;
			color: #5f4126;
			font-size: 14px;
		}
		.form-group input {
			width: 100%;
			padding: 12px;
			border: 1px solid #d7b89a;
			border-radius: 8px;
			outline: none;
		}
		.form-group input:focus {
			border-color: #a85d39;
			box-shadow: 0 0 0 2px rgba(168, 93, 57, 0.12);
		}
		.login-tip {
			margin-top: 10px;
			font-size: 12px;
			color: #8a5a3d;
			text-align: center;
		}
		.login-btn {
			width: 100%;
			padding: 12px;
			margin-top: 8px;
			border: none;
			border-radius: 8px;
			background: linear-gradient(to right, #a85d39, #e2a46d);
			color: #fff;
			font-size: 16px;
			cursor: pointer;
			transition: opacity 0.2s ease, transform 0.2s ease;
		}
		.login-btn:hover {
			opacity: 0.92;
			transform: translateY(-1px);
		}
	</style>
</head>
<body>
	<div class="login-wrap">
		<div class="login-box">
			<h1>欢迎登录</h1>
			<form id="loginForm">
				<div class="form-group">
					<label for="username">联系方式</label>
					<input type="text" id="username" name="username" autocomplete="username" placeholder="请输入联系方式" required>
				</div>
				<div class="form-group">
					<label for="password">密码</label>
					<input type="password" id="password" name="password" autocomplete="current-password" placeholder="请输入密码" required>
				</div>
				<button class="login-btn" type="submit">登录</button>
				<p class="login-tip">可直接输入任意内容完成登录</p>
			</form>
		</div>
	</div>
	<script>
		if (localStorage.getItem('isLoggedIn') === 'true') {
			window.location.replace('../index.html');
		}

		var loginForm = document.getElementById('loginForm');
		if (loginForm) {
			loginForm.addEventListener('submit', function (e) {
				e.preventDefault();
				var username = document.getElementById('username').value.trim();
				var password = document.getElementById('password').value.trim();

				if (!username || !password) {
					return;
				}

				// 账号和密码可随便输入，点击登录即可通过
				localStorage.setItem('isLoggedIn', 'true');
				window.location.replace('../index.html');
			});
		}
	</script>
</body>
</html>
